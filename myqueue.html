<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>คิวของฉัน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f2f2f7; --card: #ffffff; --ink: #000000; --muted: #8e8e93; --sep: #e5e5ea;
    --brand: #06c755; --sel-bg: #e8faf0; --radius: 14px;
    --amber: #b8860b; --blue: #007aff; --red: #d70015;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Sukhumvit Set", "Noto Sans Thai", sans-serif; background: var(--bg); color: var(--ink); line-height: 1.4; padding-bottom: 40px; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
  .nav { background: rgba(242,242,247,0.82); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); position: sticky; top: 0; z-index: 20; padding: 8px 16px 10px; padding-top: calc(8px + env(safe-area-inset-top)); border-bottom: 0.5px solid var(--sep); }
  .nav-row { display: flex; align-items: center; gap: 12px; }
  .nav .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--sep); object-fit: cover; }
  .nav .ident { font-size: 13px; color: var(--muted); }
  .nav .ident b { color: var(--ink); font-weight: 600; }
  .nav h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.022em; margin-top: 6px; }
  .scroll { max-width: 520px; margin: 0 auto; padding: 8px 16px; }
  .group-label { font-size: 13px; color: var(--muted); padding: 18px 4px 8px; font-weight: 400; }
  .qcard { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .qcard.done, .qcard.rejected { opacity: 0.62; }
  .qcard .strip { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .qcard.pending .strip { background: var(--amber); }
  .qcard.confirmed .strip { background: var(--brand); }
  .qcard.arrived .strip { background: var(--blue); }
  .qcard.done .strip { background: var(--muted); }
  .qcard.rejected .strip { background: var(--red); }
  .q-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .q-code { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .q-svc { font-size: 14px; color: var(--muted); margin-top: 1px; }
  .q-badge { padding: 4px 11px; border-radius: 100px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .q-badge.pending { background: #fdf4e3; color: var(--amber); }
  .q-badge.confirmed { background: var(--sel-bg); color: #04a548; }
  .q-badge.arrived { background: #e5f1ff; color: var(--blue); }
  .q-badge.done { background: #efeff0; color: var(--muted); }
  .q-badge.rejected { background: #ffeceb; color: var(--red); }
  .q-detail { display: flex; gap: 28px; }
  .q-detail .k { font-size: 11px; color: var(--muted); margin-bottom: 1px; }
  .q-detail .v { font-size: 15px; font-weight: 600; }
  .q-hint { font-size: 13px; color: var(--muted); margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--sep); }
  .empty { text-align: center; padding: 80px 24px; color: var(--muted); }
  .empty .ico { font-size: 48px; margin-bottom: 14px; }
  .empty .bk { display: inline-block; margin-top: 20px; background: var(--brand); color: #fff; text-decoration: none; padding: 14px 30px; border-radius: var(--radius); font-weight: 600; font-size: 16px; }
  .center { text-align: center; padding: 100px 24px; color: var(--muted); }
  .spinner { width: 30px; height: 30px; border: 2.5px solid var(--sep); border-top-color: var(--brand); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .testbadge { background: #fff8e6; color: #946200; font-size: 12px; text-align: center; padding: 6px; font-weight: 500; }
  .refresh { display: block; margin: 16px auto 0; background: var(--card); border: none; color: var(--brand); border-radius: var(--radius); padding: 14px 24px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; width: 100%; }
</style>
</head>
<body>
<div id="testbadge" class="testbadge" style="display:none">โหมดทดสอบ · เปิดนอก LINE</div>
<div id="app"><div class="center"><div class="spinner"></div>กำลังโหลด</div></div>
<script>
const LIFF_ID = "2010388192-hk8YU1Xz";
const SUPABASE_URL = "https://yknjoaaaazyoefhqztyi.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrbmpvYWFhYXp5b2VmaHF6dHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjcyNDcsImV4cCI6MjA5Njk0MzI0N30.pnDPTkJnztVoqv5mx-t40lzRv-MvevnWwz7jdebqE4E";
const BOOKING_URL = "https://liff.line.me/2010388192-cr1IKpD8";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let state = { user: null, testMode: false };
const LBL = { pending:"รอยืนยัน", confirmed:"ยืนยันแล้ว", arrived:"มาแล้ว", done:"เสร็จสิ้น", rejected:"ยกเลิก" };
const HINT = { pending:"รอร้านยืนยันคิว จะแจ้งเตือนทาง LINE", confirmed:"ยืนยันแล้ว แล้วเจอกันตามเวลานัด", arrived:"เช็คอินแล้ว กำลังรับบริการ", done:"ใช้บริการเรียบร้อยแล้ว ขอบคุณค่ะ", rejected:"คิวนี้ถูกยกเลิก จองใหม่ได้เลย" };
const ACTIVE = ["pending","confirmed","arrived"];
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    state.user = { id: p.userId, name: p.displayName, pic: p.pictureUrl };
  } catch (e) {
    state.testMode = true;
    state.user = { id: "TEST_" + Math.random().toString(36).slice(2,8), name: "ผู้ใช้ทดสอบ", pic: "" };
    document.getElementById("testbadge").style.display = "block";
  }
  await loadAndRender();
}
async function loadAndRender() {
  try {
    const { data, error } = await sb.from("bookings").select("*, services(name)")
      .eq("line_user_id", state.user.id)
      .order("booking_date", { ascending: false }).order("slot_time", { ascending: false });
    if (error) throw new Error(error.message);
    render(data || []);
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="center" style="color:var(--red)">โหลดข้อมูลไม่สำเร็จ<br><span style="font-size:13px">${e.message}</span></div>`;
  }
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short"}); }
function card(b) {
  const t = b.slot_time.slice(0,5); const svc = b.services ? b.services.name : "บริการ";
  return `<div class="qcard ${b.status}"><div class="strip"></div>
    <div class="q-top"><div><div class="q-code">#${b.booking_code}</div><div class="q-svc">${svc} · ฿${(b.price_at_booking||0).toLocaleString()}</div></div>
      <span class="q-badge ${b.status}">${LBL[b.status]}</span></div>
    <div class="q-detail"><div><div class="k">วันที่</div><div class="v">${fmtDate(b.booking_date)}</div></div><div><div class="k">เวลา</div><div class="v">${t} น.</div></div></div>
    <div class="q-hint">${HINT[b.status]||""}</div></div>`;
}
function render(bookings) {
  const u = state.user;
  const active = bookings.filter(b => ACTIVE.includes(b.status));
  const past = bookings.filter(b => !ACTIVE.includes(b.status));
  let html = `<div class="nav"><div class="nav-row">${u.pic?`<img class="avatar" src="${u.pic}">`:`<div class="avatar"></div>`}<div class="ident">คิวของ <b>${u.name}</b></div></div><h1>คิวของฉัน</h1></div><div class="scroll">`;
  if (bookings.length === 0) {
    html += `<div class="empty"><div class="ico">📅</div>ยังไม่มีการจอง<br><a class="bk" href="${BOOKING_URL}">จองคิวเลย</a></div>`;
  } else {
    if (active.length) { html += `<div class="group-label">กำลังดำเนินการ</div>` + active.map(card).join(""); }
    if (past.length) { html += `<div class="group-label">ประวัติการจอง</div>` + past.map(card).join(""); }
    html += `<button class="refresh" onclick="loadAndRender()">รีเฟรช</button>`;
  }
  html += `</div>`;
  document.getElementById("app").innerHTML = html;
}
init();
</script>
</body>
</html>
