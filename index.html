<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>จองคิว</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f2f2f7; --card: #ffffff; --ink: #000000; --ink-2: #3c3c43;
    --muted: #8e8e93; --sep: #e5e5ea; --brand: #06c755; --brand-press: #05b34c;
    --sel-bg: #e8faf0; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Sukhumvit Set", "Noto Sans Thai", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.4; padding-bottom: 120px;
    -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
  }
  .nav {
    background: rgba(242,242,247,0.82); backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    position: sticky; top: 0; z-index: 20; padding: 8px 16px 10px;
    padding-top: calc(8px + env(safe-area-inset-top)); border-bottom: 0.5px solid var(--sep);
  }
  .nav-row { display: flex; align-items: center; gap: 12px; }
  .nav .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--sep); object-fit: cover; }
  .nav .ident { font-size: 13px; color: var(--muted); }
  .nav .ident b { color: var(--ink); font-weight: 600; }
  .nav h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.022em; margin-top: 6px; }
  .scroll { max-width: 520px; margin: 0 auto; padding: 8px 16px; }
  .group { margin: 22px 0 8px; }
  .group-label { font-size: 13px; color: var(--muted); padding: 0 16px 7px; }
  .group-label .step { color: var(--brand); font-weight: 600; }
  .inset { background: var(--card); border-radius: var(--radius); overflow: hidden; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; cursor: pointer; position: relative; transition: background 0.12s; }
  .row:active { background: #f2f2f2; }
  .row + .row::before { content: ""; position: absolute; top: 0; left: 16px; right: 0; height: 0.5px; background: var(--sep); }
  .row .label { font-size: 17px; }
  .row .right { display: flex; align-items: center; gap: 10px; }
  .row .price { font-size: 17px; color: var(--muted); }
  .row .tick { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--sep); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .row.on .tick { background: var(--brand); border-color: var(--brand); }
  .row.on .tick svg { width: 13px; height: 13px; stroke: #fff; }
  .row.on .price { color: var(--brand); font-weight: 600; }
  .date-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; }
  .date-row .label { font-size: 17px; }
  input[type=date] { border: none; background: var(--bg); border-radius: 8px; padding: 7px 11px; font-size: 16px; font-family: inherit; color: var(--ink); font-weight: 500; }
  .times { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .time { background: var(--card); border-radius: var(--radius); padding: 16px 0; text-align: center; font-size: 17px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: 1.5px solid transparent; }
  .time:active { transform: scale(0.96); }
  .time.on { background: var(--sel-bg); border-color: var(--brand); color: var(--brand); font-weight: 600; }
  .time.taken { color: var(--muted); opacity: 0.4; pointer-events: none; text-decoration: line-through; }
  .field-row { display: flex; align-items: center; padding: 13px 16px; position: relative; }
  .field-row + .field-row::before { content: ""; position: absolute; top: 0; left: 16px; right: 0; height: 0.5px; background: var(--sep); }
  .field-row .fl { font-size: 17px; width: 96px; flex-shrink: 0; }
  .field-row input { flex: 1; border: none; background: none; font-size: 17px; font-family: inherit; color: var(--ink); text-align: right; outline: none; }
  .field-row input::placeholder { color: #c7c7cc; }
  .cta { position: fixed; bottom: 0; left: 0; right: 0; z-index: 30; background: rgba(255,255,255,0.86); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-top: 0.5px solid var(--sep); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .cta-in { max-width: 520px; margin: 0 auto; }
  .cta .sum { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 9px; min-height: 16px; }
  .cta .sum b { color: var(--ink); font-weight: 600; }
  .btn { width: 100%; background: var(--brand); color: #fff; border: none; border-radius: var(--radius); padding: 16px; font-size: 17px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em; }
  .btn:active:not(:disabled) { background: var(--brand-press); transform: scale(0.985); }
  .btn:disabled { background: #d1d1d6; color: #fff; }
  .center { text-align: center; padding: 100px 24px; color: var(--muted); }
  .spinner { width: 30px; height: 30px; border: 2.5px solid var(--sep); border-top-color: var(--brand); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-box { background: #fff; border-radius: var(--radius); padding: 14px 16px; margin: 12px 0; font-size: 15px; color: #d70015; display: none; text-align: center; }
  .testbadge { background: #fff8e6; color: #946200; font-size: 12px; text-align: center; padding: 6px; font-weight: 500; }
  .ok { text-align: center; padding: 48px 24px 24px; }
  .ok .circle { width: 80px; height: 80px; border-radius: 50%; background: var(--brand); display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .ok .circle svg { width: 42px; height: 42px; stroke: #fff; }
  .ok h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .ok .sub { color: var(--muted); font-size: 15px; margin-top: 4px; }
  .ok .code { font-size: 34px; font-weight: 800; color: var(--brand); margin: 20px 0; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .ok .detail { background: var(--card); border-radius: var(--radius); margin: 18px 0; overflow: hidden; text-align: left; }
  .ok .dr { display: flex; justify-content: space-between; padding: 13px 16px; font-size: 16px; position: relative; }
  .ok .dr + .dr::before { content: ""; position: absolute; top: 0; left: 16px; right: 0; height: 0.5px; background: var(--sep); }
  .ok .dr span { color: var(--muted); }
  .ok .dr b { font-weight: 600; }
  .ok .hint { font-size: 13px; color: var(--muted); margin: 14px 0 22px; }
  .btn-2 { width: 100%; background: var(--bg); color: var(--brand); border: none; border-radius: var(--radius); padding: 16px; font-size: 17px; font-weight: 600; font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div id="testbadge" class="testbadge" style="display:none">โหมดทดสอบ · เปิดนอก LINE</div>
<div id="app"><div class="center"><div class="spinner"></div>กำลังเชื่อมต่อ</div></div>
<script>
const LIFF_ID = "2010388192-cr1IKpD8";
const SUPABASE_URL = "https://yknjoaaaazyoefhqztyi.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrbmpvYWFhYXp5b2VmaHF6dHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjcyNDcsImV4cCI6MjA5Njk0MzI0N30.pnDPTkJnztVoqv5mx-t40lzRv-MvevnWwz7jdebqE4E";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let state = { user: null, services: [], slots: [], serviceId: null, date: todayStr(), slotTime: null, taken: new Set(), testMode: false };
function todayStr() { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0,10); }
function genCode() { return "BK-" + Math.floor(1000 + Math.random()*9000); }
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    state.user = { id: p.userId, name: p.displayName, pic: p.pictureUrl };
  } catch (e) {
    state.testMode = true;
    state.user = { id: "TEST_" + Math.random().toString(36).slice(2,8), name: "ผู้ใช้ทดสอบ", pic: "" };
    document.getElementById("testbadge").style.display = "block";
  }
  try { await loadData(); render(); } catch (e) { fatal("เชื่อมต่อข้อมูลไม่ได้", e.message); }
}
function fatal(t, d) { document.getElementById("app").innerHTML = `<div class="center"><div style="color:#d70015;font-weight:600;margin-bottom:8px">${t}</div><div style="font-size:13px">${d}</div></div>`; }
async function loadData() {
  const [svc, slots] = await Promise.all([
    sb.from("services").select("*").eq("is_active", true).order("sort_order"),
    sb.from("time_slots").select("*").eq("is_active", true).order("slot_time"),
  ]);
  if (svc.error) throw new Error(svc.error.message);
  if (slots.error) throw new Error(slots.error.message);
  state.services = svc.data || []; state.slots = slots.data || [];
  await refreshTaken();
}
async function refreshTaken() {
  const { data } = await sb.from("bookings").select("slot_time").eq("booking_date", state.date).in("status", ["pending","confirmed","arrived","done"]);
  state.taken = new Set((data||[]).map(b => b.slot_time.slice(0,5)));
}
function render() {
  const u = state.user;
  const svcRows = state.services.map(s => `
    <div class="row ${state.serviceId===s.id?'on':''}" onclick="pickService('${s.id}')">
      <span class="label">${s.name}</span>
      <span class="right"><span class="price">฿${s.price.toLocaleString()}</span>
        <span class="tick">${state.serviceId===s.id?'<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':''}</span></span>
    </div>`).join("");
  const timeCells = state.slots.map(s => {
    const t = s.slot_time.slice(0,5); const taken = state.taken.has(t);
    return `<div class="time ${state.slotTime===t?'on':''} ${taken?'taken':''}" onclick="pickSlot('${t}')">${t}</div>`;
  }).join("");
  const svc = state.services.find(s => s.id === state.serviceId);
  document.getElementById("app").innerHTML = `
    <div class="nav"><div class="nav-row">${u.pic?`<img class="avatar" src="${u.pic}">`:`<div class="avatar"></div>`}<div class="ident">สวัสดี <b>${u.name}</b></div></div><h1>จองคิว</h1></div>
    <div class="scroll">
      <div class="err-box" id="err"></div>
      <div class="group"><div class="group-label"><span class="step">1</span> &nbsp;เลือกบริการ</div><div class="inset">${svcRows || '<div class="row"><span class="label">ยังไม่มีบริการ</span></div>'}</div></div>
      <div class="group"><div class="group-label"><span class="step">2</span> &nbsp;เลือกวัน</div><div class="inset"><div class="date-row"><span class="label">วันที่</span><input type="date" id="bdate" value="${state.date}" min="${todayStr()}" onchange="changeDate(this.value)"></div></div></div>
      <div class="group"><div class="group-label"><span class="step">3</span> &nbsp;เลือกเวลา</div><div class="times">${timeCells || '<div style="color:var(--muted);font-size:14px;grid-column:1/-1;padding:8px">ยังไม่มีช่วงเวลา</div>'}</div></div>
      <div class="group"><div class="group-label"><span class="step">4</span> &nbsp;ข้อมูลติดต่อ</div><div class="inset">
        <div class="field-row"><span class="fl">ชื่อ</span><input type="text" id="cname" value="${u.name}" placeholder="ชื่อของคุณ"></div>
        <div class="field-row"><span class="fl">เบอร์/LINE</span><input type="tel" id="ccontact" placeholder="ไม่บังคับ"></div></div></div>
    </div>
    <div class="cta"><div class="cta-in">
      <div class="sum">${svc ? `${svc.name} · ${state.slotTime||'เลือกเวลา'} · <b>฿${svc.price.toLocaleString()}</b>` : 'เลือกบริการและเวลาเพื่อจอง'}</div>
      <button class="btn" id="bk" ${state.serviceId&&state.slotTime?'':'disabled'} onclick="submitBooking()">ยืนยันการจอง</button>
    </div></div>`;
}
function pickService(id){ state.serviceId=id; render(); }
function pickSlot(t){ if(state.taken.has(t))return; state.slotTime=t; render(); }
async function changeDate(v){ state.date=v; state.slotTime=null; await refreshTaken(); render(); }
async function submitBooking() {
  const btn = document.getElementById("bk");
  document.getElementById("err").style.display = "none";
  const name = document.getElementById("cname").value.trim();
  const contact = document.getElementById("ccontact").value.trim();
  if (!name) { showErr("กรุณากรอกชื่อ"); return; }
  btn.disabled = true; btn.textContent = "กำลังจอง…";
  const svc = state.services.find(s => s.id === state.serviceId);
  const code = genCode();
  const { data, error } = await sb.from("bookings").insert({
    booking_code: code, line_user_id: state.user.id, customer_name: name, contact,
    service_id: state.serviceId, price_at_booking: svc.price,
    booking_date: state.date, slot_time: state.slotTime, status: "pending"
  }).select().single();
  if (error) {
    if (error.code === "23505") { showErr("เวลานี้เพิ่งมีคนจอง กรุณาเลือกเวลาอื่น"); state.slotTime=null; await refreshTaken(); }
    else showErr("จองไม่สำเร็จ: " + error.message);
    btn.disabled=false; btn.textContent="ยืนยันการจอง"; render(); return;
  }
  showSuccess(code, svc, name);
  if (data && data.id) {
    try {
      fetch(`${SUPABASE_URL}/functions/v1/rapid-worker`, {
        method:"POST", headers:{"Content-Type":"application/json","Authorization":`Bearer ${SUPABASE_ANON_KEY}`},
        body: JSON.stringify({ bookingId: data.id, action: "new_booking" })
      }).catch(e=>console.error(e));
    } catch(e){ console.error(e); }
  }
}
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; e.scrollIntoView({behavior:"smooth",block:"center"}); }
function showSuccess(code, svc, name) {
  const dl = new Date(state.date+"T00:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long"});
  document.querySelector(".cta").style.display="none";
  document.getElementById("app").innerHTML = `
    <div class="ok">
      <div class="circle"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h2>จองสำเร็จ</h2><div class="sub">รอร้านยืนยัน จะแจ้งเตือนทาง LINE</div>
      <div class="code">#${code}</div>
      <div class="detail">
        <div class="dr"><span>บริการ</span><b>${svc.name}</b></div>
        <div class="dr"><span>ราคา</span><b>฿${svc.price.toLocaleString()}</b></div>
        <div class="dr"><span>วันที่</span><b>${dl}</b></div>
        <div class="dr"><span>เวลา</span><b>${state.slotTime} น.</b></div>
        <div class="dr"><span>ชื่อ</span><b>${name}</b></div>
      </div>
      <div class="hint">เช็กสถานะได้ที่เมนู "คิวของฉัน"</div>
      <button class="btn-2" onclick="location.reload()">จองอีกครั้ง</button>
    </div>`;
  window.scrollTo(0,0);
}
init();
</script>
</body>
</html>
