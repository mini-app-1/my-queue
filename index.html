<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>จองคิว · MyQueue</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #faf8f3;
    --card: #ffffff;
    --ink: #1f1d1a;
    --muted: #8b8780;
    --line: #ebe7df;
    --brand: #06c755;        /* LINE green */
    --brand-deep: #04a548;
    --accent: #c2410c;
    --sel: #eafaf0;
    --sel-line: #06c755;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Sukhumvit Set", "Noto Sans Thai", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.55;
    padding-bottom: 100px; -webkit-font-smoothing: antialiased;
  }
  .topbar {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 16px 20px; position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--line); object-fit: cover; flex-shrink: 0; }
  .topbar .who { font-size: 13px; color: var(--muted); }
  .topbar .who b { display: block; font-size: 15px; color: var(--ink); font-weight: 600; }

  .wrap { max-width: 520px; margin: 0 auto; padding: 20px; }
  .step { margin-bottom: 28px; }
  .step-label {
    display: flex; align-items: center; gap: 9px; margin-bottom: 14px;
  }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%; background: var(--ink); color: #fff;
    font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-label h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }

  .options { display: grid; gap: 10px; }
  .opt {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
    padding: 16px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    transition: all 0.15s; box-shadow: var(--shadow);
  }
  .opt:active { transform: scale(0.99); }
  .opt.selected { border-color: var(--sel-line); background: var(--sel); }
  .opt .name { font-size: 16px; font-weight: 600; }
  .opt .price { font-size: 15px; color: var(--accent); font-weight: 700; }
  .opt .price.muted { color: var(--muted); font-weight: 400; font-size: 14px; }

  .grid-time { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .slot {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px 0; text-align: center; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; box-shadow: var(--shadow);
  }
  .slot:active { transform: scale(0.97); }
  .slot.selected { border-color: var(--sel-line); background: var(--sel); }
  .slot.taken { opacity: 0.38; pointer-events: none; text-decoration: line-through; }

  input[type=date] {
    width: 100%; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px 16px; font-size: 16px; font-family: inherit; color: var(--ink); box-shadow: var(--shadow);
  }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .field input[type=text], .field input[type=tel] {
    width: 100%; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px 16px; font-size: 16px; font-family: inherit; color: var(--ink);
  }
  .field input:focus { outline: none; border-color: var(--sel-line); }

  .cta-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
    border-top: 1px solid var(--line); padding: 14px 20px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
  }
  .cta-inner { max-width: 520px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
  .cta-sum { flex: 1; font-size: 13px; color: var(--muted); }
  .cta-sum b { display: block; font-size: 16px; color: var(--ink); }
  .btn {
    background: var(--brand); color: #fff; border: none; border-radius: 12px;
    padding: 15px 28px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn:active { background: var(--brand-deep); transform: scale(0.98); }
  .btn:disabled { background: #c8c5be; cursor: not-allowed; }

  .loading, .gate { text-align: center; padding: 80px 20px; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--brand);
    border-radius: 50%; margin: 0 auto 16px; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* success */
  .success { text-align: center; padding: 60px 24px; }
  .success .check {
    width: 72px; height: 72px; border-radius: 50%; background: var(--sel);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
  }
  .success .check svg { width: 38px; height: 38px; stroke: var(--brand); }
  .success h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success .code {
    font-size: 30px; font-weight: 800; color: var(--brand-deep); letter-spacing: 0.02em;
    margin: 18px 0; font-variant-numeric: tabular-nums;
  }
  .success .detail {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; text-align: left; margin: 20px 0; box-shadow: var(--shadow);
  }
  .success .detail .row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 15px; }
  .success .detail .row span { color: var(--muted); }
  .success .detail .row b { font-weight: 600; }
  .success .note { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .btn-ghost {
    background: none; border: 1.5px solid var(--line); color: var(--ink);
    border-radius: 12px; padding: 14px 24px; font-size: 15px; font-weight: 600;
    font-family: inherit; cursor: pointer; margin-top: 8px; width: 100%;
  }

  .testbadge {
    background: #fff4e5; color: #9a6712; font-size: 12px; text-align: center;
    padding: 7px; font-weight: 600;
  }
  .err {
    background: #fdecec; color: #b42318; border-radius: 12px; padding: 14px 16px;
    font-size: 14px; margin: 12px 0; display: none;
  }
</style>
</head>
<body>

<div id="testbadge" class="testbadge" style="display:none">โหมดทดสอบ (เปิดนอก LINE) · ใช้ userId จำลอง</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    กำลังเชื่อมต่อ LINE…
  </div>
</div>

<script>
// ============================================
// CONFIG — แก้ 2 ค่านี้ก่อนใช้จริง
// ============================================
const LIFF_ID = "2010388192-cr1IKpD8";
const SUPABASE_URL = "https://yknjoaaaazyoefhqztyi.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrbmpvYWFhYXp5b2VmaHF6dHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjcyNDcsImV4cCI6MjA5Njk0MzI0N30.pnDPTkJnztVoqv5mx-t40lzRv-MvevnWwz7jdebqE4E";  // <-- เอามาจาก Supabase > API Keys > anon public

// ============================================
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let state = { user: null, services: [], slots: [], serviceId: null, date: todayStr(), slotTime: null, testMode: false };

function todayStr() {
  const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
}
function genCode() { return "BK-" + Math.floor(1000 + Math.random() * 9000); }

function fatalError(title, detail) {
  document.getElementById("app").innerHTML = `
    <div class="gate">
      <h2 style="color:#b42318;font-size:18px;margin-bottom:10px">${title}</h2>
      <p style="font-size:13px;word-break:break-all;background:#fdecec;padding:12px;border-radius:10px;text-align:left">${detail}</p>
      <button class="btn-ghost" style="max-width:300px;margin:20px auto 0" onclick="location.reload()">ลองใหม่</button>
    </div>`;
}

async function init() {
  // ขั้นที่ 1: LIFF
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    state.user = { id: p.userId, name: p.displayName, pic: p.pictureUrl };
  } catch (e) {
    // เปิดนอก LINE → โหมดทดสอบ
    state.testMode = true;
    state.user = { id: "TEST_" + Math.random().toString(36).slice(2, 8), name: "ผู้ใช้ทดสอบ", pic: "" };
    document.getElementById("testbadge").style.display = "block";
  }
  // ขั้นที่ 2: โหลดข้อมูลจาก Supabase (แยก try เพื่อแยกสาเหตุ error)
  try {
    await loadData();
    render();
  } catch (e) {
    fatalError("โหลดข้อมูลไม่สำเร็จ", "เชื่อมต่อ Supabase ไม่ได้: " + (e.message || e) + "<br><br>เช็ก: ใส่ anon key ถูกไหม / RLS เปิดอ่าน services ได้ไหม");
  }
}

async function loadData() {
  const [svc, slots] = await Promise.all([
    sb.from("services").select("*").eq("is_active", true).order("sort_order"),
    sb.from("time_slots").select("*").eq("is_active", true).order("slot_time"),
  ]);
  if (svc.error) throw new Error("services: " + svc.error.message);
  if (slots.error) throw new Error("time_slots: " + slots.error.message);
  state.services = svc.data || [];
  state.slots = slots.data || [];
  await refreshTaken();
}

// เช็ก slot ที่ถูกจองแล้วในวันนั้น
async function refreshTaken() {
  const { data } = await sb.from("bookings").select("slot_time")
    .eq("booking_date", state.date)
    .in("status", ["pending", "confirmed", "arrived"]);
  state.taken = new Set((data || []).map(b => b.slot_time.slice(0,5)));
}

function render() {
  const u = state.user;
  const svcOpts = state.services.map(s => `
    <div class="opt ${state.serviceId===s.id?'selected':''}" onclick="pickService('${s.id}')">
      <span class="name">${s.name}</span>
      <span class="price">฿${s.price.toLocaleString()}</span>
    </div>`).join("");

  const slotOpts = state.slots.map(s => {
    const t = s.slot_time.slice(0,5);
    const taken = state.taken && state.taken.has(t);
    return `<div class="slot ${state.slotTime===t?'selected':''} ${taken?'taken':''}" onclick="pickSlot('${t}')">${t}</div>`;
  }).join("");

  const svc = state.services.find(s => s.id === state.serviceId);
  const canBook = state.serviceId && state.slotTime && document.getElementById?.("cname");

  document.getElementById("app").innerHTML = `
    <div class="topbar">
      ${u.pic ? `<img class="avatar" src="${u.pic}">` : `<div class="avatar"></div>`}
      <div class="who">เข้าสู่ระบบในชื่อ<b>${u.name}</b></div>
    </div>
    <div class="wrap">
      <div class="err" id="err"></div>

      <div class="step">
        <div class="step-label"><span class="step-num">1</span><h2>เลือกบริการ</h2></div>
        <div class="options">${svcOpts || '<div class="opt"><span class="name">ยังไม่มีบริการ</span></div>'}</div>
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">2</span><h2>เลือกวัน</h2></div>
        <input type="date" id="bdate" value="${state.date}" min="${todayStr()}" onchange="changeDate(this.value)">
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">3</span><h2>เลือกเวลา</h2></div>
        <div class="grid-time">${slotOpts || '<div style="color:var(--muted);font-size:14px">ยังไม่มีช่วงเวลา</div>'}</div>
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">4</span><h2>ข้อมูลติดต่อ</h2></div>
        <div class="field">
          <label>ชื่อ</label>
          <input type="text" id="cname" value="${u.name}" placeholder="ชื่อของคุณ">
        </div>
        <div class="field">
          <label>เบอร์โทร / LINE (ถ้ามี)</label>
          <input type="tel" id="ccontact" placeholder="08x-xxx-xxxx">
        </div>
      </div>
    </div>

    <div class="cta-bar">
      <div class="cta-inner">
        <div class="cta-sum">
          ${svc ? `${svc.name} · ${state.slotTime||'—'}<b>฿${svc.price.toLocaleString()}</b>` : 'เลือกบริการและเวลา'}
        </div>
        <button class="btn" id="bookbtn" ${state.serviceId&&state.slotTime?'':'disabled'} onclick="submitBooking()">ยืนยันจอง</button>
      </div>
    </div>
  `;
}

function pickService(id) { state.serviceId = id; render(); }
function pickSlot(t) { state.slotTime = t; render(); }
async function changeDate(v) { state.date = v; state.slotTime = null; await refreshTaken(); render(); }

async function submitBooking() {
  const btn = document.getElementById("bookbtn");
  const errEl = document.getElementById("err");
  errEl.style.display = "none";
  const name = document.getElementById("cname").value.trim();
  const contact = document.getElementById("ccontact").value.trim();
  if (!name) { showErr("กรุณากรอกชื่อ"); return; }

  btn.disabled = true; btn.textContent = "กำลังจอง…";
  const svc = state.services.find(s => s.id === state.serviceId);
  const code = genCode();

  const { data, error } = await sb.from("bookings").insert({
    booking_code: code,
    line_user_id: state.user.id,
    customer_name: name,
    contact: contact,
    service_id: state.serviceId,
    price_at_booking: svc.price,
    booking_date: state.date,
    slot_time: state.slotTime,
    status: "pending"
  }).select().single();

  if (error) {
    // ชนกัน (unique violation) หรือ error อื่น
    if (error.code === "23505") {
      showErr("ขออภัย เวลานี้เพิ่งมีคนจองไปแล้ว กรุณาเลือกเวลาอื่น");
      state.slotTime = null; await refreshTaken();
    } else {
      showErr("จองไม่สำเร็จ: " + error.message);
    }
    btn.disabled = false; btn.textContent = "ยืนยันจอง";
    render();
    return;
  }

  // แสดง card สำเร็จทันที (ไม่ให้ push ที่อาจ fail มาขัด)
  showSuccess(code, svc, name);

  // เฟส 4: แจ้งเตือนกลุ่มแอดมินว่ามีจองใหม่ (ทำเบื้องหลัง ถ้า fail ไม่กระทบ card)
  if (data && data.id) {
    try {
      fetch(`${SUPABASE_URL}/functions/v1/rapid-worker`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({ bookingId: data.id, action: "new_booking" }),
      }).catch(e => console.error("แจ้งกลุ่มล้มเหลว:", e));
    } catch (e) { console.error("แจ้งกลุ่มล้มเหลว:", e); }
  }
}

function showErr(msg) {
  const e = document.getElementById("err");
  e.textContent = msg; e.style.display = "block";
  e.scrollIntoView({ behavior: "smooth", block: "center" });
}

function showSuccess(code, svc, name) {
  const dateLabel = new Date(state.date + "T00:00:00").toLocaleDateString("th-TH", { weekday:"long", day:"numeric", month:"long" });
  document.querySelector(".cta-bar").style.display = "none";
  document.getElementById("app").innerHTML = `
    <div class="success">
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h2>จองคิวสำเร็จ</h2>
      <p class="note">บันทึกคำขอจองแล้ว รอร้านยืนยัน</p>
      <div class="code">#${code}</div>
      <div class="detail">
        <div class="row"><span>บริการ</span><b>${svc.name}</b></div>
        <div class="row"><span>ราคา</span><b>฿${svc.price.toLocaleString()}</b></div>
        <div class="row"><span>วันที่</span><b>${dateLabel}</b></div>
        <div class="row"><span>เวลา</span><b>${state.slotTime} น.</b></div>
        <div class="row"><span>ชื่อ</span><b>${name}</b></div>
        <div class="row"><span>สถานะ</span><b style="color:var(--accent)">รอยืนยัน</b></div>
      </div>
      <p class="note">บันทึกเลข #${code} ไว้ตรวจสอบสถานะได้ที่เมนู "คิวของฉัน"</p>
      <button class="btn-ghost" onclick="location.reload()">จองคิวอีกครั้ง</button>
    </div>
  `;
  window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
